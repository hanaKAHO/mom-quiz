<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>麗香的每日練習 🌸</title>

<style>

body {
    font-family: "Microsoft JhengHei", sans-serif;
    display:flex;
    justify-content:center;
    padding:20px;
    background:#FFF9F2;
}

#quiz-container {
    width:100%;
    max-width:650px;
    text-align:center;
}

.question {
    font-size:42px;
    line-height:1.5;
    margin-bottom:25px;
    color:#333;
    font-weight:bold;
}

button {
    display:block;
    width:100%;
    padding:30px;
    margin:18px 0;
    font-size:34px;
    cursor:pointer;
    border:none;
    border-radius:20px;
    background:white;
    box-shadow:3px 5px 12px #ddd;
}

button:active {
    transform:scale(0.98);
}

button:disabled {
    opacity:0.7;
}

#feedback {
    font-size:34px;
    margin-top:25px;
    min-height:60px;
    font-weight:bold;
}

#score-board {
    font-size:32px;
    color:#555;
}

#progress {
    width:100%;
    height:25px;
    background:#eee;
    border-radius:20px;
    margin-bottom:25px;
    overflow:hidden;
}

#bar {
    height:100%;
    width:0%;
    background:#f4b942;
}

</style>
</head>


<body>


<div id="quiz-container">


<div id="game-area">


<div id="progress">
<div id="bar"></div>
</div>


<div class="question" id="question">
載入中...
</div>


<div id="options"></div>


<div id="feedback"></div>


</div>


<div id="score-board" style="display:none;"></div>


</div>



<script>


let allQuestions=[];
let dailyQuestions=[];
let currentIdx=0;
let score=0;
let locked=false;


const praise=[
"🌸 太棒了！",
"😊 做得很好！",
"❤️ 媽媽真厲害！",
"👏 完全正確！",
"🌷 今天狀況很好喔！",
"🎉 好棒！"
];


//讀題庫

fetch('questions.json')
.then(res=>res.json())
.then(data=>{
    allQuestions=data;
    startNewGame();
});



function startNewGame(){

    dailyQuestions=
    [...allQuestions]
    .sort(()=>0.5-Math.random())
    .slice(0,20);


    currentIdx=0;
    score=0;

    locked=false;


    document.getElementById("score-board").style.display="none";

    document.getElementById("game-area").style.display="block";


    loadQuestion();

}



function loadQuestion(){


    locked=false;


    let qData=dailyQuestions[currentIdx];


    document.getElementById("question")
    .innerText=
    `第 ${currentIdx+1} / 20 題\n${qData.q}`;


    document.getElementById("bar")
    .style.width=
    ((currentIdx)/20*100)+"%";



    let optionsDiv=document.getElementById("options");

    optionsDiv.innerHTML="";


    qData.a.forEach(opt=>{


        let btn=document.createElement("button");


        btn.innerText=opt;


        btn.onclick=()=>check(opt,btn);


        optionsDiv.appendChild(btn);


    });


}



function check(ans,clickedButton){


    if(locked)return;


    locked=true;


    document.querySelectorAll("button")
    .forEach(b=>b.disabled=true);



    let qData=dailyQuestions[currentIdx];


    let feedback=
    document.getElementById("feedback");



    if(ans===qData.correct){


        score+=10;


        feedback.style.color="#2e7d32";

        feedback.innerText=
        praise[Math.floor(Math.random()*praise.length)];


    }else{


        feedback.style.color="#1565c0";

        feedback.innerText=
        "😊 這題答案是：\n\n"+
        qData.correct+
        "\n\n我們一起記住它～";

    }



    setTimeout(()=>{


        currentIdx++;


        feedback.innerText="";


        if(currentIdx<20){

            loadQuestion();

        }else{

            showResult();

        }


    },2500);



}




function showResult(){


document.getElementById("game-area")
.style.display="none";


let board=
document.getElementById("score-board");


board.style.display="block";



let correct=score/10;


let msg="";



if(correct===20){

msg=
"🌸🌸🌸<br><br>"+
"今天全部答對！<br><br>"+
"媽媽太棒了 ❤️";

}

else{


msg=
"🌷 今天完成20題！<br><br>"+
"答對 "+correct+" 題<br><br>"+
"每天練習一點點<br>"+
"就是最棒的進步 ❤️";

}



board.innerHTML=
`
<p>${msg}</p>

<br>

<button onclick="startNewGame()">
🌸 今天再玩一次
</button>

`;

}



</script>


</body>
</html>
