<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>麗香的每日健康任務</title>
    <style>
        body { font-family: sans-serif; background-color: #fffaf0; padding: 20px; text-align: center; }
        .step { display: none; } .active { display: block; }
        button { width: 95%; padding: 20px; margin: 10px 0; font-size: 22px; border-radius: 15px; border: none; background: white; box-shadow: 2px 2px 5px #ccc; }
        #timer { font-size: 60px; color: red; font-weight: bold; margin: 20px; }
    </style>
</head>
<body>

<div id="step0" class="step active">
    <h2 id="greeting"></h2>
    <button onclick="nextStep(1)">開始今日任務</button>
</div>

<div id="step1" class="step">
    <h2>現在覺得冷還是熱？</h2>
    <button onclick="saveEnv('熱')">覺得熱</button>
    <button onclick="saveEnv('冷')">覺得冷</button>
</div>

<div id="step2" class="step">
    <h2>身體狀況如何？</h2>
    <button onclick="saveBody('胃痛')">有點胃痛</button>
    <button onclick="saveBody('累')">覺得累</button>
    <button onclick="saveBody('好')">精神很好</button>
</div>

<div id="step3" class="step">
    <h2 id="q-text">題目讀取中...</h2>
    <div id="q-btns"></div>
</div>

<div id="step4" class="step">
    <h2 id="ex-name"></h2>
    <div id="timer">30</div>
    <button id="finish-btn" style="display:none" onclick="nextEx()">完成！下一關</button>
</div>

<div id="step5" class="step">
    <h2>今天的活動完成了！很棒！</h2>
    <button onclick="location.reload()">重新開始</button>
</div>

<script>
    let allQ = [], qCount = 0, step = 0, exIdx = 0;
    const exs = ["兩手插腰身體左右轉(20次)", "站起來墊腳尖(30次)", "雙手平舉放下(15次)", "原地踏步擺手(1分鐘)", "深呼吸伸展(5次)"];

    // 1. 初始化
    const d = new Date();
    const day = d.getDay();
    let rem = (day==3||day==0) ? "（今天沒有垃圾車）" : (day==2||day==5) ? "（下午2:30金妹會來）" : "";
    document.getElementById('greeting').innerText = `麗香早安！今天是 ${d.getMonth()+1}月${d.getDate()}日 星期${'日一二三四五六'[day]} ${rem}`;

    // 2. 讀取 JSON
    fetch('questions.json').then(res => res.json()).then(data => allQ = data);

    function nextStep(s) {
        document.querySelectorAll('.step').forEach(e => e.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
        step = s;
    }

    function saveEnv(t) { alert(t=='熱'?'記得多喝水、吹電風扇喔！':'記得加件外套喔！'); nextStep(2); }
    function saveBody(t) { alert(t=='胃痛'?'記得深呼吸放鬆喔！':t=='累'?'休息一下不要勉強喔！':'太棒了，保持心情愉快！'); loadQ(); nextStep(3); }

    // 3. 測驗邏輯
    function loadQ() {
        let q = allQ[Math.floor(Math.random() * allQ.length)];
        document.getElementById('q-text').innerText = q.q;
        let area = document.getElementById('q-btns'); area.innerHTML = '';
        q.a.forEach(opt => {
            let b = document.createElement('button'); b.innerText = opt;
            b.onclick = () => { qCount++; qCount < 5 ? loadQ() : nextStep(4), startEx(); };
            area.appendChild(b);
        });
    }

    // 4. 運動邏輯
    function startEx() {
        document.getElementById('ex-name').innerText = exs[exIdx];
        document.getElementById('finish-btn').style.display = 'none';
        let sec = 30, t = setInterval(() => {
            document.getElementById('timer').innerText = --sec;
            if(sec <= 0) { clearInterval(t); document.getElementById('finish-btn').style.display = 'block'; }
        }, 1000);
    }
    function nextEx() {
        exIdx++;
        exIdx < exs.length ? startEx() : nextStep(5);
    }
</script>
</body>
</html>
