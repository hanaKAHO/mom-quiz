<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媽媽的每日練習</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #fdf6e3; }
        #quiz-container { width: 100%; max-width: 600px; text-align: center; }
        .question { font-size: 32px; margin-bottom: 25px; color: #333; font-weight: bold; }
        button { display: block; width: 100%; padding: 25px; margin: 15px 0; font-size: 24px; cursor: pointer; border: none; border-radius: 15px; background-color: #fff; box-shadow: 3px 3px 8px #ccc; }
        button:active { background-color: #e0e0e0; }
        #feedback { font-size: 28px; margin-top: 20px; font-weight: bold; min-height: 40px; }
        #score-board { font-size: 30px; color: #d35400; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="game-area">
        <div class="question" id="question">載入中...</div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>
    <div id="score-board" style="display:none;"></div>
</div>

<script>
    let allQuestions = []; // 將會從 JSON 載入
    let dailyQuestions = [];
    let currentIdx = 0;
    let score = 0;

    // 讀取 JSON 題庫
    fetch('questions.json')
        .then(res => res.json())
        .then(data => {
            allQuestions = data;
            startNewGame();
        });

    function startNewGame() {
        // 隨機選出 10 題
        dailyQuestions = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, 10);
        currentIdx = 0;
        score = 0;
        document.getElementById('score-board').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        const qData = dailyQuestions[currentIdx];
        document.getElementById('question').innerText = `第 ${currentIdx + 1}/10 題：${qData.q}`;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        qData.a.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => check(opt);
            optionsDiv.appendChild(btn);
        });
    }

    function check(ans) {
        if(ans === dailyQuestions[currentIdx].correct) {
            score += 10;
            document.getElementById('feedback').style.color = "green";
            document.getElementById('feedback').innerText = "答對了！";
        } else {
            document.getElementById('feedback').style.color = "red";
            document.getElementById('feedback').innerText = "再想一下喔～";
        }

        setTimeout(() => {
            currentIdx++;
            document.getElementById('feedback').innerText = "";
            if(currentIdx < 10) {
                loadQuestion();
            } else {
                showResult();
            }
        }, 1000);
    }

    function showResult() {
        document.getElementById('game-area').style.display = 'none';
        const board = document.getElementById('score-board');
        board.style.display = 'block';
        
        let msg = "";
        if(score === 100) msg = "100分！超級棒！";
        else if(score >= 90) msg = score + "分，很棒喔！";
        else if(score >= 80) msg = score + "分，不錯喔！";
        else if(score >= 70) msg = score + "分，還可以啦！";
        else msg = score + "分，要加油喔！";
        
        board.innerHTML = `<p>${msg}</p><button onclick="location.reload()">再玩一次</button>`;
    }
</script>
</body>
</html>
