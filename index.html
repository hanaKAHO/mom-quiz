<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>麗香的每日健康闖關</title>


<style>

body{
font-family:"Microsoft JhengHei",sans-serif;
background:#fffaf0;
padding:20px;
text-align:center;
color:#333;
}


.step{
display:none;
margin-top:30px;
}


.active{
display:block;
}


h1{
font-size:42px;
}


h2{
font-size:34px;
line-height:1.5;
}


button{
width:90%;
padding:28px;
margin:15px;
font-size:32px;
border:none;
border-radius:22px;
background:white;
box-shadow:0 5px 12px #ccc;
}


button:disabled{
opacity:0.5;
}


.btn-yes{
background:#dcedc8;
}


.btn-heat{
background:#ffe0b2;
}


.btn-cold{
background:#b3e5fc;
}


.btn-pain{
background:#ffcdd2;
}


#answer{
font-size:32px;
margin:25px;
font-weight:bold;
}


</style>

</head>


<body>


<div id="step0" class="step active">

<h1 id="greeting"></h1>

<button onclick="nextStep(1)">
開始今天任務 🌸
</button>

</div>





<div id="step1" class="step">

<h2>今天天氣感覺如何？</h2>


<button class="btn-heat"
onclick="nextStep(2)">
☀️ 覺得熱
</button>


<button class="btn-cold"
onclick="nextStep(2)">
❄️ 覺得冷
</button>

</div>






<div id="step2" class="step">


<h2>
今天身體感覺如何？
</h2>


<button class="btn-pain"
onclick="startQuiz();nextStep(3)">
😌 有點累
</button>


<button class="btn-pain"
onclick="startQuiz();nextStep(3)">
🤕 有點不舒服
</button>


<button class="btn-yes"
onclick="startQuiz();nextStep(3)">
😊 精神很好
</button>


</div>







<div id="step3" class="step">

<div id="quiz-area"></div>

</div>







<div id="step4" class="step">

<h2 id="exercise"></h2>

<button class="btn-yes"
onclick="nextExercise()">

完成這個動作 👍

</button>


</div>








<div id="step5" class="step">


<h2>
🌸 今天完成囉！
</h2>


<h2 id="result"></h2>


<button onclick="location.reload()">

明天再一起玩 ❤️

</button>


</div>






<script>


// ---------- 基本流程 ----------


let currentStep=0;


function nextStep(n){

document.getElementById("step"+currentStep)
.classList.remove("active");


currentStep=n;


document.getElementById("step"+currentStep)
.classList.add("active");

}




let d=new Date();


document.getElementById("greeting")
.innerText=
"麗香早安 🌸\n今天是 "+
(d.getMonth()+1)+"月"+
d.getDate()+"日";






// ---------- 題庫 ----------


let questions=[];

let today=[];

let qIndex=0;

let score=0;



fetch("questions.json")

.then(r=>r.json())

.then(data=>{

questions=data;

});







function startQuiz(){


today =
[...questions]
.sort(()=>Math.random()-0.5)
.slice(0,20);


qIndex=0;

score=0;


showQuestion();

}







function showQuestion(){


let q=today[qIndex];


document.getElementById("quiz-area")
.innerHTML=

`

<h2>
第 ${qIndex+1}/20 題
</h2>


<h2>
${q.q}
</h2>


${q.a.map(x=>`

<button onclick="answer('${x}')">
${x}
</button>

`).join("")}


<div id="answer"></div>


`;

}





function answer(a){


let q=today[qIndex];


let ans=document.getElementById("answer");


// 鎖按鈕

document.querySelectorAll("#quiz-area button")
.forEach(b=>b.disabled=true);



if(a===q.correct){


score++;


ans.innerHTML=
"🌸 答對了！媽媽真棒！";


}else{


ans.innerHTML=
"😊 沒關係<br>答案是："+q.correct;


}




let sec=3;



let timer=setInterval(()=>{


ans.innerHTML +=
"<br>"+sec+" 秒後下一題";


sec--;



if(sec<0){


clearInterval(timer);



qIndex++;



if(qIndex<20){


showQuestion();


}else{


nextStep(4);

loadExercise();


}



}


},1000);



}









// ---------- 運動 ----------



let exercises=[

"🌸 伸伸手 10 次",

"🌸 轉轉肩膀",

"🌸 原地踏步 30 秒",

"🌸 深呼吸 5 次",

"🌸 拍拍手 10 次"

];


let eIndex=0;



function loadExercise(){


document.getElementById("exercise")
.innerText=
exercises[eIndex];


}




function nextExercise(){


eIndex++;


if(eIndex < exercises.length){


loadExercise();


}else{


document.getElementById("result")
.innerText=
"今天20題完成！答對 "+score+" 題 ❤️";


nextStep(5);


}


}



</script>


</body>

</html>
