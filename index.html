<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麗香的每日健康任務</title>
    <style>
        body { font-family: sans-serif; background-color: #fffaf0; padding: 20px; text-align: center; color: #333; }
        .step { display: none; } .active { display: block; }
        button { width: 95%; padding: 20px; margin: 10px 0; font-size: 24px; border: none; border-radius: 15px; background: #fff; box-shadow: 2px 2px 5px #ccc; }
        .btn-yes { background: #c8e6c9; }
        .btn-heat { background: #ffcc80; } .btn-cold { background: #81d4fa; } .btn-pain { background: #ef9a9a; }
        #timer { font-size: 50px; font-weight: bold; color: #d32f2f; margin: 20px; }
    </style>
</head>
<body>

<div id="step0" class="step active">
    <h2 id="greeting"></h2>
    <button onclick="nextStep(1)">開始今日任務</button>
</div>

<div id="step1" class="step">
    <h2>今天天氣如何？</h2>
    <button class="btn-heat" onclick="setWeather('熱')">覺得熱</button>
    <button class="btn-cold" onclick="setWeather('冷')">覺得冷</button>
</div>
<div id="step2" class="step">
    <h2>今天身體狀況如何？</h2>
    <button class="btn-pain" onclick="setBody('有點胃痛')">有點胃痛</button>
    <button class="btn-yes" onclick="setBody('精神很好')">精神很好</button>
</div>

<div id="step3" class="step">
    <h3 id="q-text">題目載入中...</h3>
    <div id="q-btns"></div>
</div>

<div id="step4" class="step">
    <h2 id="ex-name"></h2>
    <div id="timer">30</div>
    <button id="next-ex-btn" class="btn-yes" style="display:none" onclick="nextExercise()">完成！進入下一關</button>
</div>

<div id="step5" class="step">
    <h2>全部完成了！麗香真棒！</h2>
    <button onclick="location.reload()">再做一次</button>
</div>

<script>
// 1. 測驗題庫：從外部 JSON 檔案讀取
    let allQuestions = [];

    // 網頁啟動時，自動去讀取 questions.json
    fetch('questions.json')
        .then(response => response.json())
        .then(data => {
            allQuestions = data;
            console.log("題庫讀取成功，共 " + allQuestions.length + " 題");
        })
        .catch(err => {
            console.error("無法讀取 questions.json，請檢查檔案名稱與位置", err);
            // 備用方案：如果讀取失敗，顯示簡單提示
            document.getElementById('q-text').innerText = "題庫載入失敗，請檢查網路或檔案位置";
        });

    let qIdx = 0, currentStep = 0, exIdx = 0;

    // 2. 初始化
    // 初始化日期與生活提醒
    const date = new Date();
    const day = date.getDay(); // 0:星期日, 1:星期一, ..., 6:星期六
    let reminder = "";

    // 判斷提醒
    if (day === 3 || day === 0) {
        reminder = "（今天沒有垃圾車喔！）";
    } else if (day === 2 || day === 5) {
        reminder = "（下午 2:30 金妹會來喔！）";
    }

    document.getElementById('greeting').innerText = 
        `麗香早安！今天是 ${date.getMonth()+1}月${date.getDate()}日 星期${'日一二三四五六'[day]} ${reminder}`;


    function nextStep(s) {
        document.querySelectorAll('.step').forEach(e => e.classList.remove('active'));
        currentStep = s;
        document.getElementById('step'+currentStep).classList.add('active');
        if(currentStep === 4) startTimer();
    }

    function setWeather(t) { alert(t === '熱' ? '多喝水、吹電風扇！' : '加件外套喔！'); nextStep(2); }
    function setBody(t) { alert(t === '有點胃痛' ? '試著深呼吸放鬆喔！' : '太棒了！'); loadQuiz(); nextStep(3); }

    // 3. 測驗邏輯
    function loadQuiz() {
        let q = allQuestions[qIdx];
        document.getElementById('q-text').innerText = q.q;
        let btnArea = document.getElementById('q-btns');
        btnArea.innerHTML = '';
        q.a.forEach(opt => {
            let b = document.createElement('button');
            b.innerText = opt;
            b.onclick = () => { qIdx++; qIdx < 2 ? loadQuiz() : nextStep(4); };
            btnArea.appendChild(b);
        });
    }

    // 4. 運動與計時邏輯
    function startTimer() {
        document.getElementById('ex-name').innerText = exercises[exIdx];
        document.getElementById('next-ex-btn').style.display = 'none';
        let count = 30;
        document.getElementById('timer').innerText = count;
        let t = setInterval(() => {
            count--;
            document.getElementById('timer').innerText = count;
            if(count <= 0) { clearInterval(t); document.getElementById('next-ex-btn').style.display = 'block'; }
        }, 1000);
    }

    function nextExercise() {
        exIdx++;
        exIdx < exercises.length ? startTimer() : nextStep(5);
    }
</script>
</body>
</html>
