<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麗香的每日健康闖關</title>

<style>
    body { font-family: "Microsoft JhengHei", sans-serif; background: #fffcf5; text-align: center; padding: 30px; line-height: 1.6; font-size: 32px; }
    .step { display: none; }
    .active { display: block; }
    h1 { font-size: 56px; white-space: pre-line; color: #333; }
    h2 { font-size: 48px; color: #d84315; }
    button { width: 95%; padding: 35px; margin: 20px auto; font-size: 40px; font-weight: bold; border-radius: 30px; border: 3px solid #ccc; box-shadow: 0 6px 12px #aaa; display: block; }
    .btn-heat { background: #ffe0b2; } .btn-cold { background: #b3e5fc; }
    .btn-pain { background: #ffcdd2; } .btn-yes { background: #dcedc8; }
    #timerDisplay { font-size: 100px; font-weight: bold; color: #2e7d32; margin: 30px 0; }
    #answer { font-size: 40px; font-weight: bold; margin-top: 30px; color: #d32f2f; }
</style>
</head>

<body>

<div id="step0" class="step active">
    <h1 id="greeting"></h1>
    <button onclick="nextStep(1)">開始今天任務 🌸</button>
</div>

<div id="step1" class="step">
    <h2>今天天氣感覺如何？</h2>
    <button class="btn-heat" onclick="feel('hot');delayNext(2)">☀️ 覺得熱</button>
    <button class="btn-cold" onclick="feel('cold');delayNext(2)">❄️ 覺得冷</button>
</div>

<div id="step2" class="step">
    <h2>今天身體感覺如何？</h2>
    <button class="btn-pain" onclick="feel('stomach');startQuiz()">🤢 胃痛</button>
    <button class="btn-pain" onclick="feel('dizzy');startQuiz()">😵 頭暈</button>
    <button class="btn-yes" onclick="startQuiz()">😊 精神很好</button>
</div>

<div id="step3" class="step">
    <div id="quiz-area"></div>
</div>

<div id="step4" class="step">
    <h2>一起動一動，麗香真棒！</h2>
    <div id="exerciseName" style="font-size: 48px; font-weight: bold; color: #ef6c00;"></div>
    <div id="exerciseCount" style="font-size: 40px; color: #666;"></div>
    <div id="timerDisplay"></div>
    <button id="exerciseBtn" onclick="nextExercise()" style="background: #a5d6a7;" disabled>完成這個動作 👍</button>
</div>

<div id="step5" class="step">
    <h2>🌸 今天完成囉！</h2>
    <h2 id="result"></h2>
    <button onclick="location.reload()">明天再一起玩 ❤️</button>
</div>

<script>
    let currentStep = 0;
    let questions = [], today = [], qIndex = 0, score = 0, loaded = false, e = 0;
    const exercises = ["伸伸手10次", "轉轉肩膀", "原地踏步30秒", "深呼吸5次", "拍拍手10次"];

    function nextStep(n) {
        document.getElementById("step" + currentStep).classList.remove("active");
        currentStep = n;
        document.getElementById("step" + n).classList.add("active");
    }

    function delayNext(n) { setTimeout(() => nextStep(n), 300); }

    // 初始化讀取題目
    fetch("questions.json").then(r => r.json()).then(d => { questions = d; loaded = true; }).catch(() => alert("找不到題目檔"));

    function startQuiz() {
        if (!loaded) return alert("題目還在準備中...");
        today = [...questions].sort(() => Math.random() - 0.5).slice(0, 20);
        qIndex = 0; score = 0; nextStep(3); showQuestion();
    }

    function showQuestion() {
        let q = today[qIndex];
        document.getElementById("quiz-area").innerHTML = `<h2>第 ${qIndex + 1}/20 題</h2><h2>${q.q}</h2>` + 
            q.a.map(x => `<button onclick="answer('${x.replace(/'/g, "&#39;")}')">${x}</button>`).join("") + `<div id="answer"></div>`;
    }

    function answer(a) {
        let q = today[qIndex], ans = document.getElementById("answer");
        document.querySelectorAll("#quiz-area button").forEach(b => b.disabled = true);
        if (a === q.correct) { score++; ans.innerHTML = "🌸答對了！"; } else { ans.innerHTML = "答案：" + q.correct; }
        let s = 2;
        let t = setInterval(() => {
            ans.innerHTML += `<br>${s} 秒後下一題`; s--;
            if (s < 0) { clearInterval(t); qIndex++; qIndex < 20 ? showQuestion() : (nextStep(4), loadExercise()); }
        }, 1000);
    }

    function loadExercise() {
        let btn = document.getElementById("exerciseBtn"); btn.disabled = true;
        let s = 30; document.getElementById("exerciseName").innerText = exercises[e];
        let t = setInterval(() => {
            s--; document.getElementById("timerDisplay").innerText = s + " 秒";
            if (s <= 0) { clearInterval(t); document.getElementById("timerDisplay").innerText = "✅"; btn.disabled = false; }
        }, 1000);
    }

    function nextExercise() {
        e++;
        if (e < exercises.length) { loadExercise(); } 
        else { document.getElementById("result").innerText = `今天20題完成！答對 ${score} 題 ❤️`; nextStep(5); }
    }

    // 初始問候
    const d = new Date();
    const w = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
    document.getElementById("greeting").innerText = `麗香早安 🌸\n今天是 ${d.getMonth()+1}月${d.getDate()}日 ${w[d.getDay()]}`;
</script>
</body>
</html>
