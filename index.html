<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麗香的每日健康闖關</title>

<style>
/* 放大字體與增加閱讀舒適度 */
body {
    font-family: "Microsoft JhengHei", sans-serif;
    background: #fffcf5;
    text-align: center;
    padding: 30px;
    line-height: 1.6; /* 增加行距 */
    font-size: 32px; /* 全域基礎字體加大 */
}

.step { display: none; }
.active { display: block; }

h1 { font-size: 56px; white-space: pre-line; color: #333; }
h2 { font-size: 48px; color: #d84315; }

button {
    width: 95%;
    padding: 35px; /* 按鈕加大，更易點擊 */
    margin: 20px auto;
    font-size: 40px; /* 按鈕字體特大 */
    font-weight: bold;
    border-radius: 30px;
    border: 3px solid #ccc;
    box-shadow: 0 6px 12px #aaa;
    display: block;
}

.btn-heat { background: #ffe0b2; }
.btn-cold { background: #b3e5fc; }
.btn-pain { background: #ffcdd2; }
.btn-yes { background: #dcedc8; }

#timerDisplay {
    font-size: 100px; /* 計時器極大化 */
    font-weight: bold;
    color: #2e7d32;
    margin: 30px 0;
}

#answer { font-size: 40px; font-weight: bold; margin-top: 30px; color: #d32f2f; }
</style>
</head>

<body>

<div id="step0" class="step active">
    <h1 id="greeting"></h1>
    <button onclick="nextStep(1)">開始今天任務 🌸</button>
</div>

<div id="step1" class="step">
    <h2>今天天氣感覺如何？</h2>
    <button class="btn-heat" onclick="feel('hot');delayNext(2)">☀️ 覺得熱</button>
    <button class="btn-cold" onclick="feel('cold');delayNext(2)">❄️ 覺得冷</button>
</div>

<div id="step2" class="step">
    <h2>今天身體感覺如何？</h2>
    <button class="btn-pain" onclick="feel('stomach');startQuiz()">🤢 胃痛</button>
    <button class="btn-pain" onclick="feel('dizzy');startQuiz()">😵 頭暈</button>
    <button class="btn-yes" onclick="startQuiz()">😊 精神很好</button>
</div>

<div id="step3" class="step">
    <div id="quiz-area"></div>
</div>

<div id="step4" class="step">
    <h2>一起動一動，麗香真棒！</h2>
    <div id="exerciseName" style="font-size: 48px; font-weight: bold; color: #ef6c00;"></div>
    <div id="exerciseCount" style="font-size: 40px; color: #666;"></div>
    <div id="timerDisplay"></div>
    <button id="exerciseBtn" onclick="nextExercise()" style="background: #a5d6a7;" disabled>完成這個動作 👍</button>
</div>

<div id="step5" class="step">
    <h2>🌸 今天完成囉！</h2>
    <h2 id="result"></h2>
    <button onclick="location.reload()">明天再一起玩 ❤️</button>
</div>

<script>
    let currentStep = 0;
    function nextStep(n) {
        document.getElementById("step" + currentStep).classList.remove("active");
        currentStep = n;
        document.getElementById("step" + n).classList.add("active");
    }

    function delayNext(n) { setTimeout(() => nextStep(n), 300); }

    // 日期問候設定
    const d = new Date();
    const w = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
    let g = `麗香早安 🌸\n今天是 ${d.getMonth()+1}月${d.getDate()}日 ${w[d.getDay()]}`;
    if(d.getDay()==2||d.getDay()==5) g += "\n\n今天下午2:30金妹會來喔 😊";
    if(d.getDay()==3||d.getDay()==0) g += "\n\n今天沒有垃圾車喔 🚛";
    document.getElementById("greeting").innerText = g;

    function feel(t) {
        const m = {
            hot: "☀️ 記得吹電風、多喝水喔！💧",
            cold: "❄️ 要記得穿保暖衣服喔！🧥",
            stomach: "🤢 先深呼吸、熱敷一下肚子喔！❤️",
            dizzy: "😵 請先坐下來休息一下喔！🌸"
        };
        alert(m[t]);
    }

    // 題目邏輯保持不變，但因CSS已全域放大，按鈕會自動變大
    // ... (後續 JavaScript 邏輯同前一版)
</script>

</body>
</html>
