<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媽媽的每日練習</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #fdf6e3; }
        #quiz-container { width: 100%; max-width: 500px; text-align: center; }
        .question { font-size: 28px; margin-bottom: 20px; color: #333; }
        button { display: block; width: 100%; padding: 20px; margin: 10px 0; font-size: 22px; cursor: pointer; border: none; border-radius: 10px; background-color: #fff; box-shadow: 2px 2px 5px #ccc; }
        button:active { background-color: #e0e0e0; }
        #feedback { font-size: 24px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div class="question" id="question">題目載入中...</div>
    <div id="options"></div>
    <div id="feedback"></div>
</div>

<script>
const questions = [
    { q: "買一斤蘋果 50 元，兩斤多少錢？", a: ["100元", "80元", "50元"], correct: "100元" },
    { q: "蔥 20 元，豆腐 30 元，這樣一共多少？", a: ["50元", "40元", "60元"], correct: "50元" },
    { q: "東西 70 元，給老闆 100 元，找多少？", a: ["30元", "20元", "40元"], correct: "30元" },
    { q: "麵條一包 45 元，兩包多少錢？", a: ["90元", "85元", "100元"], correct: "90元" },
    { q: "500 元鈔票一張，換成 100 元有幾張？", a: ["5張", "10張", "2張"], correct: "5張" },
    { q: "下列哪一個是廚房用品？", a: ["鍋子", "牙刷", "枕頭"], correct: "鍋子" },
    { q: "冰箱裡應該放什麼？", a: ["冷凍肉類", "報紙", "拖鞋"], correct: "冷凍肉類" },
    { q: "下列哪一個是蔬菜？", a: ["青江菜", "蘋果", "魚"], correct: "青江菜" },
    { q: "垃圾分類：果皮屬於什麼？", a: ["廚餘", "紙類", "鐵罐"], correct: "廚餘" },
    { q: "今天天氣很（），適合去公園走走。", a: ["晴朗", "生氣", "難過"], correct: "晴朗" },
    { q: "晚餐我想煮（），因為很營養。", a: ["番茄炒蛋", "石頭", "塑膠"], correct: "番茄炒蛋" },
    { q: "喉嚨痛的時候，要記得（）。", a: ["多喝溫水", "大聲吼叫", "喝冰水"], correct: "多喝溫水" },
    

];

    let currentQ = 0;

    function loadQuestion() {
        const qData = questions[currentQ];
        document.getElementById('question').innerText = qData.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        qData.a.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => check(opt);
            optionsDiv.appendChild(btn);
        });
    }

    function check(ans) {
        if(ans === questions[currentQ].correct) {
            document.getElementById('feedback').innerText = "太棒了，答對了！";
            setTimeout(() => { 
                currentQ = (currentQ + 1) % questions.length; 
                document.getElementById('feedback').innerText = "";
                loadQuestion(); 
            }, 1500);
        } else {
            document.getElementById('feedback').innerText = "再想一下喔～";
        }
    }

    loadQuestion();
</script>
</body>
</html>
